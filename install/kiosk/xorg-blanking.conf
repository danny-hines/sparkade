# Sparkade kiosk: never blank or power-save the display. No input events arrive
# while the cabinet sits idle on the attract screen, so X's screensaver/DPMS
# would otherwise sleep the panel ("no signal" → dark). Setting these at the X
# server level is race-free and does NOT depend on `xset` being installed.
Section "ServerFlags"
    Option "BlankTime" "0"
    Option "StandbyTime" "0"
    Option "SuspendTime" "0"
    Option "OffTime" "0"
EndSection
